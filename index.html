<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankDash - Responsive Sidebar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Mont:wght@400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .font-mont {
            font-family: 'Mont', sans-serif;
        }
        
        /* Active menu item style */
        .menu-item.active {
            color: #1814F3;
            background-color: rgba(24, 20, 243, 0.05);
        }
        
        .menu-item.active .normal-icon {
            display: none;
        }
        
        .menu-item.active .active-icon {
            display: inline-block;
        }
        
        .menu-item.active .active-line {
            display: block;
        }
        
        /* Hide scrollbar for sidebar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-[#F5F7FA] flex">

    <!-- Sidebar -->
    <aside id="sidebar" 
           class="fixed inset-y-0 left-0 w-64 bg-white border-r border-[#E6EFF5] flex flex-col 
                  transform -translate-x-full lg:translate-x-0 transition-transform duration-300 
                  ease-in-out z-30 h-full overflow-hidden">
        
        <!-- Header -->
        <div class="pt-8 px-5 pb-5 flex-shrink-0">
            <div class="flex items-center space-x-2">
                <img src="/imgs/icons/logo.png" alt="BankDash Logo" class="w-9 h-9 object-contain">
                <h2 class="text-[25px] font-black text-[#343C6A] font-mont">BankDash<span class="text-[#343C6A]">.</span></h2>
            </div>
        </div>

        <!-- Navigasi dengan scroll -->
        <nav class="flex-1 py-4 overflow-y-auto no-scrollbar">
            <div class="space-y-2">
                <!-- Dashboard (tidak aktif) -->
                <div class="flex items-center px-8 py-3 text-[18px] font-medium text-[#B1B1B1] cursor-default">
                    <img src="/imgs/icons/dashboard.png" class="w-[25px] h-[25px] mr-3">
                    <span>Dashboard</span>
                </div>

                <!-- Transactions (aktif) -->
                <a href="/pages/transactions.html" 
                   class="menu-item active flex items-center px-8 py-3 text-[18px] font-medium text-[#B1B1B1] rounded-lg hover:bg-gray-100 transition-all relative group"
                   data-menu-id="transactions">
                    <span class="active-line absolute left-0 top-0 h-full w-1 bg-[#1814F3] rounded-r-full hidden"></span>
                    <img src="/imgs/icons/transactions.png" class="w-[25px] h-[25px] mr-3 normal-icon">
                    <img src="/imgs/icons/transactions-active.png" class="w-[25px] h-[25px] mr-3 hidden active-icon">
                    <span>Transactions</span>
                </a>

                <!-- Accounts -->
                <a href="/pages/accounts.html" 
                   class="menu-item flex items-center px-8 py-3 text-[18px] font-medium text-[#B1B1B1] rounded-lg hover:bg-gray-100 transition-all relative group"
                   data-menu-id="accounts">
                    <span class="active-line absolute left-0 top-0 h-full w-1 bg-[#1814F3] rounded-r-full hidden"></span>
                    <img src="/imgs/icons/accounts.png" alt="Accounts" class="w-[25px] h-[25px] mr-3 normal-icon">
                    <img src="/imgs/icons/accounts-active.png" alt="Accounts" class="w-[25px] h-[25px] mr-3 hidden active-icon">
                    <span class="truncate">Accounts</span>
                </a>

                <!-- Investments -->
                <div class="flex items-center px-8 py-3 text-[18px] font-medium text-[#B1B1B1] cursor-default">
                    <img src="/imgs/icons/investments.png" class="w-[25px] h-[25px] mr-3">
                    <span>Investments</span>
                </div>

                <!-- Credit Cards -->
                <div class="flex items-center px-8 py-3 text-[18px] font-medium text-[#B1B1B1] cursor-default">
                    <img src="/imgs/icons/credit-cards.png" class="w-[25px] h-[25px] mr-3">
                    <span>Credit Cards</span>
                </div>

                <!-- Loans -->
                <div class="flex items-center px-8 py-3 text-[18px] font-medium text-[#B1B1B1] cursor-default">
                    <img src="/imgs/icons/loans.png" class="w-[25px] h-[25px] mr-3">
                    <span>Loans</span>
                </div>

                <!-- Services -->
                <div class="flex items-center px-8 py-3 text-[18px] font-medium text-[#B1B1B1] cursor-default">
                    <img src="/imgs/icons/services.png" class="w-[25px] h-[25px] mr-3">
                    <span>Services</span>
                </div>

                <!-- My Privileges -->
                <div class="flex items-center px-8 py-3 text-[18px] font-medium text-[#B1B1B1] cursor-default">
                    <img src="/imgs/icons/my-privileges.png" class="w-[25px] h-[25px] mr-3">
                    <span>My Privileges</span>
                </div>

                <!-- Setting -->
                <a href="/pages/setting.html" 
                   class="menu-item flex items-center px-8 py-3 text-[18px] font-medium text-[#B1B1B1] rounded-lg hover:bg-gray-100 transition-all relative group"
                   data-menu-id="setting">
                    <span class="active-line absolute left-0 top-0 h-full w-1 bg-[#1814F3] rounded-r-full hidden"></span>
                    <img src="/imgs/icons/setting.png" class="w-[25px] h-[25px] mr-3 normal-icon">
                    <img src="/imgs/icons/setting-active.png" alt="Setting" class="w-[25px] h-[25px] mr-3 hidden active-icon">
                    <span>Setting</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- Overlay untuk mobile -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-20 lg:hidden"></div>

    <!-- Tombol toggle untuk mobile -->
    <button id="menu-toggle" class="lg:hidden fixed top-5 left-4 z-40 p-2.5 bg-[#1814F3] text-white rounded-lg shadow-lg hover:bg-blue-700 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <!-- Memanggil file JavaScript eksternal -->
    <script src="js/sidebar.js"></script>
</body>
</html>
