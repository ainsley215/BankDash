<!-- HEADER COMPONENT - Responsif dengan page title di tengah untuk mobile -->
<header class="bg-white border-b border-gray-200 px-4 sm:px-6 py-3 sm:py-4 w-full">
    <div class="flex items-center justify-between">
        <!-- Left Section: Page Title - Di mobile jadi di tengah -->
        <div class="flex items-center flex-1 sm:flex-none">
            <!-- Hamburger button placeholder untuk spacing di mobile (invisible) -->
            <div class="w-8 sm:hidden"></div>

            <!-- Page Title - Center di mobile, left di desktop -->
            <div class="flex-1 text-center sm:text-left">
                <span id="page-title" class="font-medium text-[#343C6A] 
                           text-[20px] sm:text-[24px] lg:text-[28px] 
                           font-['Inter',sans-serif] font-semibold">
                    Overview
                </span>
            </div>

            <!-- Right spacer for mobile (invisible) -->
            <div class="w-8 sm:hidden"></div>
        </div>

        <!-- Right Section: Search & Actions -->
        <div class="flex items-center space-x-2 sm:space-x-3 lg:space-x-5">
            <!-- Search Bar - Desktop -->
            <div class="hidden sm:block w-[200px] lg:w-[255px]">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <img src="../imgs/icons/search.png" alt="Search" class="w-4 sm:w-5 h-4 sm:h-5">
                    </div>
                    <input type="text" id="search-input" placeholder="Search for something" class="block w-full pl-9 sm:pl-10 pr-3 
                               h-[40px] sm:h-[45px] lg:h-[50px] 
                               border border-[#F5F7FA] 
                               rounded-[20px] sm:rounded-[25px] 
                               bg-[#F5F7FA] 
                               focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 
                               transition-all duration-200 
                               text-[13px] sm:text-[14px] lg:text-[15px] 
                               text-[#8BA3CB] placeholder:text-[#8BA3CB] 
                               font-['Inter',sans-serif] font-normal">
                </div>
            </div>

            <!-- User Actions -->
            <div class="flex items-center space-x-2 sm:space-x-3 lg:space-x-5">
                <!-- Setting -->
                <button id="settings-btn" class="p-1.5 sm:p-2 hover:bg-gray-100 rounded-lg transition-colors 
                           relative w-[35px] sm:w-[42px] lg:w-[50px] 
                           h-[35px] sm:h-[42px] lg:h-[50px] 
                           flex items-center justify-center group">
                    <div class="absolute inset-0 bg-[#F5F7FA] rounded-full group-hover:bg-gray-200 transition-colors">
                    </div>
                    <img src="../imgs/icons/settings-profile.png" alt="Setting"
                        class="w-4 sm:w-5 lg:w-6 h-4 sm:h-5 lg:h-6 relative z-10">
                </button>

                <!-- Notification Bell -->
                <button id="notification-btn" class="p-1.5 sm:p-2 hover:bg-gray-100 rounded-lg transition-colors 
                           relative w-[35px] sm:w-[42px] lg:w-[50px] 
                           h-[35px] sm:h-[42px] lg:h-[50px] 
                           flex items-center justify-center group">
                    <div class="absolute inset-0 bg-[#F5F7FA] rounded-full group-hover:bg-gray-200 transition-colors">
                    </div>
                    <img src="../imgs/icons/notif.png" alt="Notification"
                        class="w-4 sm:w-5 lg:w-6 h-4 sm:h-5 lg:h-6 relative z-10">
                    <span class="absolute top-1 sm:top-2 right-1 sm:right-2 
                                 w-1.5 sm:w-2 h-1.5 sm:h-2 bg-red-500 rounded-full"></span>
                </button>

                <!-- User Avatar -->
                <button id="profile-btn" class="flex items-center space-x-1 sm:space-x-2 
                               hover:bg-gray-100 rounded-lg p-0.5 sm:p-1 transition-colors">
                    <img src="../imgs/icons/photo-profile.png" alt="User Avatar" class="w-[40px] sm:w-[50px] lg:w-[60px] 
                                h-[40px] sm:h-[50px] lg:h-[60px] rounded-full">
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Search -->
    <div class="mt-3 sm:mt-4 sm:hidden px-4">
        <div class="relative">
            <!-- Icon kiri -->
            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                <img src="../imgs/icons/search.png" alt="Search" class="w-4 h-4 opacity-50">
            </div>

            <!-- Input -->
            <input type="text" id="mobile-search-input" placeholder="Search for something" class="block w-full pl-10 pr-3 py-2.5 
                   text-[14px] text-gray-400 
                   bg-gray-100 
                   rounded-full 
                   border border-gray-100 
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                   transition-all duration-200">
        </div>
    </div>
</header>
